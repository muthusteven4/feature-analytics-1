version: "3.9"
services:
  api:
    build: .
    container_name: feature-analytics-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/analytics.db
    restart: unless-stopped
```

That's it. Super simple. No healthcheck, no seeder for now.

